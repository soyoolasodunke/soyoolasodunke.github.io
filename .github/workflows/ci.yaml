on:
  push:
  pull_request:
    types: [opened, synchronize]
jobs:
  build:
    runs-on: ubuntu-latest
    name: script/cibuild
    steps:
      - uses: actions/checkout@v2
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true
      - name: build
        run: |
          chmod +x script/bootstrap
          git add script/bootstrap
          git commit -m "Make bootstrap script executable"
          git push
      - name: test
        run: bash script/cibuild
